services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: phtracker
      POSTGRES_PASSWORD: phtracker_dev
      POSTGRES_DB: phtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
